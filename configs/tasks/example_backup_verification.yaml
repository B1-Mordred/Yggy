id: yggy_backup_verification
name: Yggy Backup Verification
type: backup_verification
enabled: true
owner: local_user
created_by: yggdrasil

trigger:
  kind: schedule
  cron: "15 9 * * *"
  timezone: Europe/Berlin

backup:
  backup_root: /app/backups
  max_age_hours: 26
  min_mysql_dump_bytes: 1024
  secret_scan_enabled: true
  max_scan_bytes_per_file: 2000000
  required_files:
    - manifest.json
    - mysql/automation.sql
    - api/health.json
    - api/tasks.json
    - api/topics.json
    - api/openapi.json
    - git-commit.txt

output:
  channel: discord
  target: alerts
  format: "anomalies only"

policy:
  approval_level: L1_NOTIFY_ONLY
  require_sources: false
  max_runs_per_hour: 2
  max_runs_per_day: 4
  min_seconds_between_runs: 1800
  allow_external_side_effects: false
  allow_shell: false
  allow_docker_socket: false
  allow_filesystem_write: false

runtime:
  dry_run: false
  timeout_seconds: 60
  retry_count: 1

notifications:
  on_success: false
  on_failure: true
  on_empty_result: false
  quiet_hours:
    enabled: false
    start: "22:00"
    end: "07:00"
    timezone: Europe/Berlin
  collapse_repeated_failures: true
  failure_collapse_window_minutes: 120
