version: 1

include_files:
  - preapproved_sources.tsv

sources:
  - id: open_webui_releases
    name: Open WebUI releases
    type: rss
    url: https://github.com/open-webui/open-webui/releases.atom
    categories:
      - local_ai
      - project_releases
    trust_level: official_project_release_feed
    enabled: true
    max_items: 5

  - id: ollama_releases
    name: Ollama releases
    type: rss
    url: https://github.com/ollama/ollama/releases.atom
    categories:
      - local_ai
      - project_releases
    trust_level: official_project_release_feed
    enabled: true
    max_items: 5

  - id: n8n_releases
    name: n8n releases
    type: rss
    url: https://github.com/n8n-io/n8n/releases.atom
    categories:
      - workflow_automation
      - project_releases
    trust_level: official_project_release_feed
    enabled: true
    max_items: 5

  - id: docker_blog
    name: Docker blog
    type: rss
    url: https://www.docker.com/blog/feed/
    categories:
      - containers
      - security_news
    trust_level: official_vendor_blog
    enabled: true
    max_items: 5
