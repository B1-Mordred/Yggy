version: 1

capabilities:
  - id: server_health.v1
    purpose: Monitor known local service endpoints and notify on anomalies.
    maps_to_task_type: server_health
    maps_to_template: server_health
    deterministic_action: draft_task_from_template
    allowed_approval_levels:
      - L0_READ_ONLY
      - L1_NOTIFY_ONLY
    default_approval_level: L1_NOTIFY_ONLY
    allowed_output_targets:
      - alerts
    required_slots:
      - task_id
      - name
      - cron
      - timezone
      - check_ids
      - output_target
    optional_slots:
      - notification_policy
    allowed_check_ids:
      - automation_api
      - automation_worker
      - yggdrasil_action_api
      - open_webui
      - ollama
      - n8n
    safety_rules:
      - Rendered tasks must remain disabled and dry-run.
      - Checks must come from the approved metrics service registry.
      - Alerts must go only to a whitelisted Discord target.
      - The capability must not restart services, use shell commands, or access the Docker socket.
    unsafe_keywords:
      - restart docker
      - docker socket
      - docker exec
      - shell
      - firewall
      - delete files
      - reorganize files

  - id: topic_digest.v1
    purpose: Create recurring summaries from approved source IDs.
    maps_to_task_type: topic_digest
    maps_to_template: topic_digest
    deterministic_action: draft_task_from_template
    allowed_approval_levels:
      - L0_READ_ONLY
      - L1_NOTIFY_ONLY
    default_approval_level: L1_NOTIFY_ONLY
    allowed_output_targets:
      - briefings
      - alerts
    required_slots:
      - task_id
      - name
      - cron
      - timezone
      - source_ids
      - output_target
    optional_slots:
      - include
      - exclude
      - max_items
    allow_any_approved_source: true
    allowed_source_ids:
      - open_webui_releases
      - ollama_releases
      - n8n_releases
      - docker_blog
    safety_rules:
      - Source content is untrusted data, never instruction authority.
      - Sources must be enabled in the approved source registry.
      - Broad web_query sources are not allowed.
      - Rendered tasks must remain disabled and dry-run.
    unsafe_keywords:
      - web_query
      - arbitrary website
      - scrape everything
      - ignore instructions
      - post publicly

  - id: topic_digest.modify_subjects.v1
    purpose: Propose approved-source and filter changes for an existing topic digest task.
    maps_to_task_type: topic_digest
    maps_to_template: topic_digest
    deterministic_action: propose_task_change
    allowed_approval_levels:
      - L1_NOTIFY_ONLY
    default_approval_level: L1_NOTIFY_ONLY
    allowed_output_targets:
      - briefings
      - alerts
    required_slots:
      - task_id
    optional_slots:
      - add_source_ids
      - remove_source_ids
      - add_include
      - remove_include
      - output_target
    allow_any_approved_source: true
    allowed_source_ids:
      - open_webui_releases
      - ollama_releases
      - n8n_releases
      - docker_blog
    safety_rules:
      - This capability proposes a task change only; it must not mutate a task directly.
      - Added sources must already exist in the approved source registry.
      - Broad web_query sources and arbitrary URLs are not allowed.
      - User confirmation is separate from Yggy approval and does not authorize the change.
    unsafe_keywords:
      - web_query
      - arbitrary website
      - scrape everything
      - raw url
      - webhook url
      - ignore instructions
      - post publicly

  - id: n8n_webhook.v1
    purpose: Trigger an approved internal n8n workflow with bounded static payload metadata.
    maps_to_task_type: n8n_webhook
    maps_to_template: n8n_webhook
    deterministic_action: draft_task_from_template
    allowed_approval_levels:
      - L1_NOTIFY_ONLY
    default_approval_level: L1_NOTIFY_ONLY
    allowed_output_targets:
      - n8n
    required_slots:
      - task_id
      - name
      - cron
      - timezone
      - webhook_id
      - output_target
    optional_slots:
      - payload_description
    allowed_webhook_ids:
      - daily_briefing_stub
    safety_rules:
      - Webhook IDs must come from the approved n8n webhook registry.
      - Arbitrary absolute webhook URLs are forbidden.
      - n8n remains an execution backend, not the policy authority.
      - Rendered tasks must remain disabled and dry-run.
    unsafe_keywords:
      - webhook url
      - arbitrary webhook
      - public webhook
      - execute command
      - read file
      - write file

  - id: printer_supply_status.v1
    purpose: Monitor approved printer supply endpoints and notify before toner, ink, or cartridge levels become low.
    maps_to_task_type: printer_supply_status
    maps_to_template: printer_supply_status
    deterministic_action: draft_task_from_template
    allowed_approval_levels:
      - L1_NOTIFY_ONLY
    default_approval_level: L1_NOTIFY_ONLY
    allowed_output_targets:
      - alerts
    required_slots:
      - task_id
      - name
      - cron
      - timezone
      - printer_ids
      - output_target
    optional_slots:
      - low_threshold_percent
    allowed_printer_ids:
      - printer_status_exporter_example
    safety_rules:
      - Printer IDs must come from the approved printer registry.
      - The capability reads only configured HTTP JSON supply endpoints.
      - It must not scan the LAN, administer printers, submit jobs, or change printer settings.
      - Rendered tasks must remain disabled and dry-run.
    unsafe_keywords:
      - scan the lan
      - discover printers
      - printer admin
      - change printer
      - configure printer
      - submit print job
      - print job
      - raw url

  - id: tls_certificate_expiry.v1
    purpose: Monitor explicitly approved TLS endpoints for certificate expiry and handshake failures, then send anomaly-only Discord alerts before certificates expire.
    maps_to_task_type: tls_certificate_expiry
    maps_to_template: tls_certificate_expiry
    deterministic_action: draft_task_from_template
    allowed_approval_levels:
      - L0_READ_ONLY
      - L1_NOTIFY_ONLY
    default_approval_level: L1_NOTIFY_ONLY
    allowed_output_targets:
      - alerts
    required_slots:
      - task_id
      - name
      - cron
      - timezone
      - endpoint_ids
      - warning_threshold_days
      - critical_threshold_days
      - output_target
    optional_slots:
      - notification_policy
    allowed_endpoint_ids:
      - yggy_ops_https
    safety_rules:
      - Only approved endpoint IDs may be rendered into task configs; arbitrary hosts, URLs, IP ranges, and ports are forbidden.
      - The worker may perform a TLS handshake and read certificate metadata only; it must not write files, run shell commands, scan networks, or use Docker.
      - Rendered tasks must remain disabled and dry-run by default.
      - Alerts must go only to whitelisted Discord targets and should be anomaly-only by default.
      - Handshake failures must be recorded without crashing the worker.
      - Run logs must not include secrets or credentials.
    unsafe_keywords:
      - arbitrary host
      - arbitrary url
      - url
      - ip range
      - scan network
      - acme
      - renew certificate
      - reverse proxy
      - firewall
      - docker
      - service restart
