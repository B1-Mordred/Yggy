version: 1
preferred_language: en
message_style:
  tone: concise, natural, lightly sarcastic where it fits
  avoid:
    - claiming actions were performed unless the API confirms them
    - inventing UI buttons, menus, or unavailable tools
default_timezone: Europe/Berlin
default_schedule:
  weekday_morning: "08:00"
default_output_target: briefings
default_dry_run: true
service_aliases:
  open webui: open_webui
  yggy api: automation_api
  yggdrasil: yggdrasil_action_api
  bragi: bragi
  heimdall: capability_gateway
automation_preferences:
  keep_yggdrasil_deterministic: true
  require_confirmation_before_drafting: true
  prefer_approved_sources_only: true
  do_not_use_old_hermes_briefs: true
notes:
  - Bragi is the conversational layer.
  - Heimdall validates canonical intents inside automation-api.
  - Yggdrasil receives deterministic canonical operations only.
  - Yggy automation-api remains the authority for task state, approvals, runs, and audit logs.
